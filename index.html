<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Cuan — Kalkulator HPP & Harga Jual UMKM</title>
    <meta
      name="description"
      content="Hitung harga jual yang aman dan menguntungkan dalam kurang dari 1 menit. Kalkulator HPP, margin, pajak, dan simulasi diskon untuk UMKM."
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('marginmate_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
